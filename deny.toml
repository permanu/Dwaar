# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = [
    "RUSTSEC-2025-0132",  # maxminddb mmap — read-only usage, acceptable
    "RUSTSEC-2025-0069",  # daemonize unmaintained — Pingora dep
    "RUSTSEC-2024-0388",  # derivative unmaintained — Pingora dep
    "RUSTSEC-2024-0384",  # instant unmaintained — Pingora transitive
    "RUSTSEC-2024-0437",  # protobuf recursion — Pingora tracing dep
]

[licenses]
version = 2
# Only check third-party crates, skip our own BSL-licensed crates
private = { ignore = true, registries = [] }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
    "AGPL-3.0-or-later",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
