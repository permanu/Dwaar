# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
]
copyleft = "deny"
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny specific crates we don't want
deny = [
    # Use pingora's HTTP client, not reqwest
    { name = "reqwest", wrappers = [] },
    # Use pingora's TLS, not direct openssl
    # { name = "openssl", wrappers = ["pingora-openssl"] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
