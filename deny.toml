# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# Ignore advisories from Pingora's transitive dependencies we can't control
ignore = [
    # maxminddb mmap unsoundness — we use it read-only, acceptable risk
    "RUSTSEC-2023-0078",
    # protobuf recursion crash — Pingora's tracing dep, not in our hot path
    "RUSTSEC-2024-0437",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
]

# Our own crates use BSL-1.1 which isn't in SPDX — allow them explicitly
[[licenses.clarify]]
name = "dwaar-core"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-config"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-tls"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-analytics"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-plugins"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-admin"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-docker"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-geo"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-log"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[[licenses.clarify]]
name = "dwaar-cli"
expression = "BSL-1.0"
license-files = [{ path = "../../LICENSE", hash = 0 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"  # workspace = true deps show as wildcards
highlight = "all"

deny = [
    # Use pingora's HTTP client, not reqwest (except in dev-deps for testing)
    { name = "reqwest", wrappers = [] },
]
# Allow reqwest in dev-dependencies (testing)
skip = [
    { name = "reqwest" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
