msrv = "1.94"

# Architectural enforcement — prevent direct use of APIs we wrap
[[disallowed-methods]]
path = "std::process::exit"
reason = "Use anyhow::Result and proper error propagation instead of process::exit"

# Prevent println in library code (use tracing instead)
[[disallowed-macros]]
path = "std::println"
reason = "Use tracing::info!, tracing::debug!, etc. instead of println!"

[[disallowed-macros]]
path = "std::eprintln"
reason = "Use tracing::error!, tracing::warn!, etc. instead of eprintln!"
