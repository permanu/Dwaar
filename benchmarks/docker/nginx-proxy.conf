# nginx as reverse proxy — mirrors Dwaar's config exactly.
# Single upstream, no caching, no buffering, keepalive to upstream.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    # Disable access logging for benchmark (matches Dwaar which logs async)
    access_log off;
    error_log /dev/null crit;

    # Keepalive to upstream (like Dwaar's connection pool)
    upstream backend_pool {
        server backend:80;
        keepalive 256;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Match Dwaar's timeout defaults
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
