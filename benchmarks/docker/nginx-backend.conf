# nginx as the upstream backend — serves a static JSON response.
# Tuned for maximum throughput (this must NOT be the bottleneck).

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    error_log /dev/null crit;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    server {
        listen 80;

        location / {
            default_type application/json;
            return 200 '{"status":"ok","routes":42,"rps":125000,"p99_ms":0.8,"uptime":"14d 3h","backends":[{"domain":"api.example.com","upstream":"10.0.0.1:3000","status":"healthy"},{"domain":"web.example.com","upstream":"10.0.0.2:8080","status":"healthy"},{"domain":"cdn.example.com","upstream":"10.0.0.3:9000","status":"healthy"}],"metrics":{"total_requests":1200000,"bytes":48000000,"visitors":45000}}';
        }
    }
}
