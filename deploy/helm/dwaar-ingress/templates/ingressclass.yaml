apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: {{ .Values.controller.ingressClass | default "dwaar" }}
  labels:
    {{- include "dwaar-ingress.labels" . | nindent 4 }}
  {{- if .Values.ingressClass.default }}
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
  {{- end }}
spec:
  controller: dwaar.dev/ingress-controller
