apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dwaar-ingress.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dwaar-ingress.labels" . | nindent 4 }}
spec:
  # Leader election makes only one pod active at a time, but we keep two
  # replicas so a standby is already running when the leader pod is evicted.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dwaar-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dwaar-ingress.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dwaar-ingress.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --admin-url={{ .Values.controller.adminUrl }}
            - --health-addr=0.0.0.0:{{ .Values.health.port }}
            - --lease-name={{ .Values.controller.leaseName }}
            - --lease-namespace={{ .Values.controller.leaseNamespace }}
            - --cert-dir={{ .Values.controller.certDir }}
            {{- if .Values.controller.ingressClass }}
            - --ingress-class={{ .Values.controller.ingressClass }}
            {{- end }}
            {{- if .Values.controller.watchNamespace }}
            - --namespace={{ .Values.controller.watchNamespace }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: cert-dir
              mountPath: {{ .Values.controller.certDir }}
      volumes:
        # TLS PEM files are written here by the watcher and read by Dwaar.
        # An emptyDir is sufficient — the controller re-materialises certs on startup.
        - name: cert-dir
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
