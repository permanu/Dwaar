# Default values for dwaar-ingress.

replicaCount: 2

image:
  repository: ghcr.io/permanu/dwaar-ingress
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Whether to create a ServiceAccount for the controller.
  create: true
  # Annotations to add to the service account (e.g. for IRSA / Workload Identity).
  annotations: {}
  # Override the name; defaults to the fullname helper.
  name: ""

# Annotations to apply to every pod.
podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource requests/limits for the controller container.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Controller-specific configuration — maps directly to CLI flags / env vars.
controller:
  # Dwaar admin API URL. Adjust to match your Dwaar service name.
  adminUrl: "http://dwaar-admin:9000"

  # Only manage Ingresses with this IngressClass name.
  # Leave empty to manage all Ingresses (not recommended in shared clusters).
  ingressClass: "dwaar"

  # Namespace to watch. Leave empty to watch all namespaces.
  watchNamespace: ""

  # Leader election Lease name.
  leaseName: "dwaar-ingress-leader"

  # Namespace where the leader election Lease lives.
  leaseNamespace: "kube-system"

  # Directory where TLS PEM files materialised from Kubernetes Secrets are stored.
  # Must match the emptyDir / volume mount below.
  certDir: "/var/lib/dwaar-ingress/certs"

# Health server configuration.
health:
  # Port on which /healthz and /readyz are served.
  port: 8080

# Service exposing HTTP (80) and HTTPS (443) to the cluster / external LB.
service:
  type: LoadBalancer
  httpPort: 80
  httpsPort: 443
  # Target ports on the pod. Defaults to httpPort / httpsPort if not set.
  # Override when the proxy listens on non-standard ports.
  httpTargetPort: 80
  httpsTargetPort: 443
  # Cloud-provider annotations for the LoadBalancer (e.g. AWS NLB, GCP GCLB).
  annotations: {}

# IngressClass resource.
ingressClass:
  # Set to true to mark this IngressClass as the cluster-wide default.
  default: false

# Pod anti-affinity — require spreading replicas across nodes.
# Uses hard anti-affinity by default to guarantee HA. Override with
# preferredDuringSchedulingIgnoredDuringExecution for dev/single-node clusters.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: dwaar-ingress
        topologyKey: kubernetes.io/hostname

nodeSelector: {}

tolerations: []

# Persistent storage for TLS certificates.
# When enabled, certs survive pod restarts without re-materialisation.
persistence:
  enabled: false
  storageClass: ""
  size: 64Mi
  accessModes:
    - ReadWriteOnce

# Extra environment variables injected into the controller container.
extraEnv: []
# - name: RUST_LOG
#   value: "dwaar_ingress=debug"
