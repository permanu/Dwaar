[package]
name = "dwaar-grpc"
version = "0.1.0"
description = "Bidirectional gRPC control fabric — DwaarControl service (Permanu ↔ Dwaar)"
edition.workspace = true
publish = false
rust-version.workspace = true
license-file = "../../LICENSE"
repository.workspace = true
authors.workspace = true

[dependencies]
tonic = { version = "0.14", features = ["tls-ring"] }
# tonic-prost provides ProstCodec, which the code generated by tonic-prost-build references.
tonic-prost = "0.14"
# tonic-prost 0.14 requires prost 0.14; bump from 0.13 to match.
prost = "0.14"
tokio = { workspace = true, features = ["rt-multi-thread", "net", "macros", "sync", "time"] }
tokio-stream = "0.1"
futures-core = "0.3"
async-trait = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
parking_lot = { workspace = true }
arc-swap = { workspace = true }
fastrand = { workspace = true }
dashmap = { workspace = true }
dwaar-core = { workspace = true }

[build-dependencies]
# tonic-build 0.14 dropped compile_protos; proto compilation is now in tonic-prost-build.
tonic-prost-build = "0.14"

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = { workspace = true }
rcgen = { workspace = true }

[lints]
workspace = true
