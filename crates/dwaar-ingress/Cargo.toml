[package]
name = "dwaar-ingress"
version = "0.1.0"
description = "Kubernetes ingress controller — watches Ingress/Service/Secret resources and syncs routes to the Dwaar admin API"
edition.workspace = true
publish = false
rust-version.workspace = true
license-file = "../../LICENSE"
repository.workspace = true
authors.workspace = true

[[bin]]
name = "dwaar-ingress"
path = "src/main.rs"

[dependencies]
# Kubernetes client and runtime (not in workspace — only used here)
kube = { version = "0.98", features = ["runtime", "derive", "client"] }
k8s-openapi = { version = "0.24", features = ["v1_32"] }

# Prometheus metrics exposition (not in workspace — only used here)
prometheus-client = "0.22"

# HTTP server for health/readiness/metrics (not in workspace — only used here)
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"

# HTTP client for admin API calls (not in workspace — only used here)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Async stream utilities (re-exported by kube, but we need the trait in scope)
futures = "0.3"

# Workspace deps
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }

[lints]
workspace = true
