name: Bug Report
description: Report a bug in Dwaar
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Dwaar Version
      description: Output of `dwaar version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and architecture
      placeholder: "Ubuntu 22.04 x86_64"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Dwaarfile Configuration
      description: Your Dwaarfile (redact sensitive values)
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Error messages or log output
      render: shell
