name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check license headers on Rust files
        run: |
          MISSING=0
          for file in $(find crates/ src/ -name '*.rs' 2>/dev/null); do
            if ! head -5 "$file" | grep -q "Business Source License"; then
              echo "MISSING LICENSE HEADER: $file"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "Add this header to all .rs files:"
            echo "// Copyright (C) 2026 Permanu"
            echo "// SPDX-License-Identifier: BSL-1.1"
            exit 1
          fi
          echo "All files have license headers."

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # cargo-deny requires latest Rust but our rust-toolchain.toml pins 1.86
      # Temporarily hide the toolchain file so we get the latest stable
      - name: Install latest Rust (bypassing rust-toolchain.toml)
        run: |
          mv rust-toolchain.toml rust-toolchain.toml.bak
          rustup default stable
          rustup update stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Restore toolchain file
        run: mv rust-toolchain.toml.bak rust-toolchain.toml
      - name: Run cargo-deny
        run: cargo deny check --workspace
