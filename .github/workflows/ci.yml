name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs for the same branch when a new commit lands.
# Prevents queued-run pile-up during active feature work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    # Linux-only — Dwaar ships as a Linux server binary; macOS coverage adds
    # 10× runner cost (macos minutes are billed at 10× linux) for negligible
    # signal. Cross-platform validation happens at release tag time via
    # release.yml's matrix (linux-amd64, linux-arm64, darwin-arm64).
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      # proxy_integration.rs requires a live dwaar instance + hardcoded
      # port 8080 (ISSUE-010). Exclude dwaar-cli integration tests from
      # CI; run lib + bin tests only.
      - run: cargo test --workspace --exclude dwaar-cli
      - run: cargo test -p dwaar-cli --bins --test cli_integration
      - name: Run ignored tests
        run: cargo test --workspace --exclude dwaar-cli -- --ignored --nocapture
        timeout-minutes: 15

  build:
    # Dev-profile build only — the test job already compiles the workspace
    # in dev. Release-profile compilation runs at tag time in release.yml,
    # where lto=fat + codegen-units=1 actually matter. Doing it here added
    # 5–10 min per PR for zero practical signal beyond what `cargo test`
    # already provides.
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check license headers on Rust files
        run: |
          MISSING=0
          for file in $(find crates/ src/ -name '*.rs' 2>/dev/null); do
            if ! head -5 "$file" | grep -q "Business Source License"; then
              echo "MISSING LICENSE HEADER: $file"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "Add this header to all .rs files:"
            echo "// Copyright (C) 2026 Permanu"
            echo "// SPDX-License-Identifier: BSL-1.1"
            exit 1
          fi
          echo "All files have license headers."

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Install cargo-deny from prebuilt binaries (~5s) instead of
      # compiling from source (~2-3min on cold runner). Doesn't need
      # the Rust toolchain at all.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check
