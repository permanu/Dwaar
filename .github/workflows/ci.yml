name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # proxy_integration.rs requires a live dwaar instance + hardcoded
      # port 8080 (ISSUE-010). Exclude dwaar-cli integration tests from
      # CI; run lib + bin tests only.
      - run: cargo test --workspace --exclude dwaar-cli
      - run: cargo test -p dwaar-cli --lib --bins
      - name: Run ignored tests
        run: cargo test --workspace --exclude dwaar-cli -- --ignored --nocapture
        timeout-minutes: 15

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check license headers on Rust files
        run: |
          MISSING=0
          for file in $(find crates/ src/ -name '*.rs' 2>/dev/null); do
            if ! head -5 "$file" | grep -q "Business Source License"; then
              echo "MISSING LICENSE HEADER: $file"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "Add this header to all .rs files:"
            echo "// Copyright (C) 2026 Permanu"
            echo "// SPDX-License-Identifier: BSL-1.1"
            exit 1
          fi
          echo "All files have license headers."

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny
        run: cargo deny check
