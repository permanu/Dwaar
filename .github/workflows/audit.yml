name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  schedule:
    # Run daily at 06:00 UTC to catch new advisories
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Use latest stable Rust for cargo-audit (not our pinned toolchain)
      # cargo-audit inspects Cargo.lock, doesn't compile our code
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: >-
          cargo audit
          --ignore RUSTSEC-2025-0069
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2024-0384
          --ignore RUSTSEC-2024-0437
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2025-0012
          --ignore RUSTSEC-2026-0097
