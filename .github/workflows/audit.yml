name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  schedule:
    # Run daily at 06:00 UTC to catch new advisories
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Install cargo-audit from prebuilt binaries (~5s) instead of
      # compiling from source (~2-3min). cargo-audit only inspects
      # Cargo.lock — it doesn't need the Rust toolchain.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run audit
        run: >-
          cargo audit
          --ignore RUSTSEC-2025-0069
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2024-0384
          --ignore RUSTSEC-2024-0437
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2025-0012
          --ignore RUSTSEC-2026-0097
