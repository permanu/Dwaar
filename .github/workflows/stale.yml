name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 90 days and will be closed in 14 days
            unless there is new activity. If this is still relevant, please comment
            to keep it open.
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed in 14 days
            unless there is new activity.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen when ready.
          days-before-stale: 90
          days-before-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,blocked'
          exempt-pr-labels: 'pinned,security,blocked'
