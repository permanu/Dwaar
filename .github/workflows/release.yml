name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dwaar-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dwaar-linux-arm64
          # x86_64-apple-darwin dropped — Apple ended support for Intel Macs
          # and macos-latest runners are ARM-only since macOS 14.
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: dwaar-darwin-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Explicit target add — belt-and-braces for cross-compile targets
      # where dtolnay/rust-toolchain may not install the std library.
      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dwaar dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Verify license date matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          LICENSED_VERSION=$(grep "Licensed Work:" LICENSE | head -1 | awk '{print $NF}')
          if [ "$TAG" != "$LICENSED_VERSION" ]; then
            echo "ERROR: Tag v${TAG} does not match LICENSE version ${LICENSED_VERSION}"
            echo "Run: ./scripts/bump-license-date.sh ${TAG}"
            exit 1
          fi
          echo "License version matches tag: v${TAG}"

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract section between this version and the next version header
          NOTES=$(awk "/^## \[${TAG}\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${TAG}"
          fi
          echo "notes<<EOFNOTES" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOFNOTES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: artifacts/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-r2:
    name: Publish to R2
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Upload artifacts and version manifest to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Upload versioned artifacts (binary + sha256 for each target)
          for file in artifacts/dwaar-*; do
            filename="$(basename "$file")"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${filename}" \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "public, max-age=31536000, immutable"
          done

          # Update the `latest` pointer — plain text, short cache so updates
          # propagate within minutes. The installer reads this to resolve
          # which version to download.
          echo -n "$TAG" > /tmp/latest
          aws s3 cp /tmp/latest "s3://${R2_BUCKET}/latest" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "text/plain" \
            --cache-control "public, max-age=300"

          echo "Published ${TAG} to R2 and updated latest pointer"

  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dwaar-linux-amd64
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: dwaar-linux-arm64
          path: dist/

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch Docker image
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          chmod +x dist/dwaar-linux-amd64 dist/dwaar-linux-arm64

          cat > Dockerfile.release <<'DOCKERFILE'
          FROM gcr.io/distroless/cc-debian12:nonroot
          ARG TARGETARCH
          COPY dist/dwaar-linux-${TARGETARCH} /usr/local/bin/dwaar
          ENTRYPOINT ["dwaar"]
          DOCKERFILE

          # Rename binaries to match TARGETARCH values (amd64/arm64)
          docker buildx build --platform linux/amd64,linux/arm64 \
            -f Dockerfile.release \
            -t ghcr.io/permanu/dwaar:${TAG} \
            -t ghcr.io/permanu/dwaar:latest \
            --push .
