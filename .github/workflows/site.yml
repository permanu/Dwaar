name: Documentation Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright (for Mermaid)
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Build site
        working-directory: site
        run: npx astro build

      - name: Verify no source maps (Guardrail #38)
        working-directory: site
        run: |
          count=$(find dist -name '*.map' | wc -l)
          if [ "$count" -ne 0 ]; then
            echo "ERROR: Found $count source map files in dist/"
            find dist -name '*.map'
            exit 1
          fi
