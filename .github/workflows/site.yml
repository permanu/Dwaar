name: Documentation Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright (for Mermaid)
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Build site
        working-directory: site
        run: npx astro build

      - name: Verify no source maps (Guardrail #38)
        working-directory: site
        run: |
          count=$(find dist -name '*.map' | wc -l)
          if [ "$count" -ne 0 ]; then
            echo "ERROR: Found $count source map files in dist/"
            find dist -name '*.map'
            exit 1
          fi

      - name: Verify install.sh is in build output
        run: |
          if [ ! -f site/dist/install.sh ]; then
            echo "ERROR: install.sh missing from build output"
            exit 1
          fi
          head -3 site/dist/install.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
