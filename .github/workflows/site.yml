name: Documentation Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright (for Mermaid)
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Build site
        working-directory: site
        run: npx astro build

      # Option A: Deploy to Cloudflare Pages
      # Uncomment when CF_API_TOKEN and CF_ACCOUNT_ID are set in repo secrets
      # - name: Deploy to Cloudflare Pages
      #   if: github.ref == 'refs/heads/main'
      #   uses: cloudflare/wrangler-action@v3
      #   with:
      #     apiToken: ${{ secrets.CF_API_TOKEN }}
      #     accountId: ${{ secrets.CF_ACCOUNT_ID }}
      #     command: pages deploy site/dist --project-name=dwaar-docs

      # Option B: Deploy to GitHub Pages (drop-in replacement for mdbook)
      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
